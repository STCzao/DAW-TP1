<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TurnoMed - Gestión de Turnos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">🏥</span>
      <span class="brand-name">TurnoMed</span>
    </div>
    <nav id="main-nav">
      <a data-view="dashboard" class="nav-link active">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a data-view="nuevo-turno" class="nav-link">
        <span class="nav-icon">➕</span>
        <span class="nav-label">Nuevo Turno</span>
      </a>
      <a data-view="lista-turnos" class="nav-link">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Lista de Turnos</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <span>v1.0.0</span>
    </div>
  </aside>

  <!-- OVERLAY MOBILE -->
  <div id="sidebar-overlay"></div>

  <!-- MAIN CONTENT -->
  <main id="main-content">
    <header id="page-header">
      <div class="header-left">
        <button id="sidebar-toggle" aria-label="Abrir menú">☰</button>
        <h1 id="page-title">Dashboard</h1>
      </div>
      <div id="header-clock"></div>
    </header>

    <div id="app-root"></div>
  </main>

  <!-- MODAL -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box" role="dialog" aria-modal="true">
      <div id="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close" aria-label="Cerrar">✕</button>
      </div>
      <div id="modal-body"></div>
      <div id="modal-footer">
        <button id="modal-cancel" class="btn btn-secondary">Cancelar</button>
        <button id="modal-confirm" class="btn btn-danger">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- TOASTS -->
  <div id="toast-container" aria-live="polite"></div>

  <script src="js/app.js"></script>
</body>
</html>
